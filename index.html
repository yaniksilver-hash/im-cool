<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I'm cool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #ffffff;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.25) 40%, rgba(0,0,0,0.7) 100%),
        url("cosmic-sloth.jpg") center / cover no-repeat,
        #0b0220;
      background-attachment: fixed, fixed, scroll;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
      min-height: 100vh;
    }
    main { max-width: 48rem; }
    h1 {
      font-size: clamp(3rem, 14vw, 10rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      text-shadow:
        0 0 24px rgba(255, 60, 172, 0.55),
        0 0 60px rgba(120, 80, 255, 0.45),
        0 8px 40px rgba(0,0,0,0.7);
    }
    p {
      margin-top: 1.5rem;
      font-size: clamp(1rem, 2.2vw, 1.35rem);
      opacity: 0.92;
      text-shadow: 0 2px 12px rgba(0,0,0,0.85);
    }
    .badge {
      margin-top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .dot {
      width: 0.5rem; height: 0.5rem; border-radius: 50%;
      background: #00ff9d;
      box-shadow: 0 0 12px #00ff9d;
    }
    .credit {
      position: fixed;
      bottom: 1rem; right: 1rem;
      font-size: 0.7rem;
      opacity: 0.55;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <main>
    <h1>I&rsquo;m cool</h1>
    <p>First site by Yanik &mdash; built from the terminal, pushed to GitHub, served by Cloudflare.<br/>Background sloth conjured from the cosmos by Imagen&nbsp;4.</p>
    <span class="badge"><span class="dot"></span> Live</span>
  </main>
  <div class="credit">cosmic sloth &middot; google imagen 4 via replicate</div>
</body>
</html>
